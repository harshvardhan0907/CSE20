<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>E-Cart</title>

  <!-- Tailwind CDN -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Toggle Script -->
  <script>
    function toggleMenu() {
      document.getElementById("menu").classList.toggle("hidden");
    }
  </script>
</head>

<body class="bg-gray-100">

  <!-- Navbar -->
  <nav class="bg-blue-600 text-white p-4 flex justify-between items-center">
    <h1 class="text-xl font-bold">E-Cart</h1>

    <!-- Desktop Menu -->
    <ul class="hidden md:flex gap-6">
      <li class="hover:underline cursor-pointer">Home</li>
      <li class="hover:underline cursor-pointer">Shop</li>
      <li class="hover:underline cursor-pointer">Cart</li>
      <li class="hover:underline cursor-pointer">Contact</li>
    </ul>

    <!-- Hamburger -->
    <button class="md:hidden text-2xl" onclick="toggleMenu()">☰</button>
  </nav>

  <!-- Mobile Menu -->
  <div id="menu" class="hidden bg-blue-500 text-white flex flex-col items-center py-4 md:hidden">
    <p class="py-2">Home</p>
    <p class="py-2">Shop</p>
    <p class="py-2">Cart</p>
    <p class="py-2">Contact</p>
  </div>

  <!-- Hero Section -->
  <section class="text-center py-16 bg-white">
    <h2 class="text-3xl md:text-4xl font-bold">Welcome to E-Cart</h2>
    <p class="mt-4 text-gray-600">Best deals on amazing products</p>
    <button class="mt-6 bg-blue-500 text-white px-6 py-2 rounded hover:bg-blue-700">
      Shop Now
    </button>
  </section>

  <!-- Products -->
  <section class="p-6 grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">

    <!-- Product Card -->
    <div class="bg-white p-4 rounded-lg shadow">
      <img src="https://via.placeholder.com/200" class="w-full rounded">
      <h3 class="text-lg font-bold mt-2">Product 1</h3>
      <p class="text-gray-600">₹999</p>
      <button class="mt-3 w-full bg-green-500 text-white py-2 rounded">Add to Cart</button>
    </div>

    <div class="bg-white p-4 rounded-lg shadow">
      <img src="https://via.placeholder.com/200" class="w-full rounded">
      <h3 class="text-lg font-bold mt-2">Product 2</h3>
      <p class="text-gray-600">₹799</p>
      <button class="mt-3 w-full bg-green-500 text-white py-2 rounded">Add to Cart</button>
    </div>

    <div class="bg-white p-4 rounded-lg shadow">
      <img src="https://via.placeholder.com/200" class="w-full rounded">
      <h3 class="text-lg font-bold mt-2">Product 3</h3>
      <p class="text-gray-600">₹599</p>
      <button class="mt-3 w-full bg-green-500 text-white py-2 rounded">Add to Cart</button>
    </div>

    <div class="bg-white p-4 rounded-lg shadow">
      <img src="https://via.placeholder.com/200" class="w-full rounded">
      <h3 class="text-lg font-bold mt-2">Product 4</h3>
      <p class="text-gray-600">₹1299</p>
      <button class="mt-3 w-full bg-green-500 text-white py-2 rounded">Add to Cart</button>
    </div>

  </section>

  <!-- Footer -->
  <footer class="bg-blue-600 text-white text-center p-4 mt-6">
    © 2026 E-Cart | All Rights Reserved
  </footer>

</body>
</html>
