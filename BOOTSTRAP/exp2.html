<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Bootstrap Product Card</title>
  
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-light bg-light">
  <a class="navbar-brand" href="#">MySite</a>
  <button class="navbar-toggler" type="button" data-toggle="collapse" 
          data-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" 
          aria-label="Toggle navigation">
    <span class="navbar-toggler-icon"></span>
  </button>
  <div class="collapse navbar-collapse" id="navbarNav">
    <ul class="navbar-nav ml-auto">
      <li class="nav-item"><a class="nav-link" href="#">Home</a></li>
      <li class="nav-item"><a class="nav-link" href="#">About</a></li>
      <li class="nav-item"><a class="nav-link" href="#">Contact</a></li>
    </ul>
  </div>
</nav>


<div class="container my-5">
  <div class="row row-cols-1 row-cols-md-3 g-4">
    
    
    <div class="col">
      <div class="card h-100">
        <img src="./img 2.webp" class="card-img-top" alt="Product Image">
        <div class="card-body">
          <h5 class="card-title">Watch</h5>
          <p class="card-text"> smart watch that keep you smart</p>
          <p class="fw-bold">$29.99</p>
          <a href="#" class="btn btn-primary">Add to Cart</a>
        </div>
      </div>
    </div>

    
    <div class="col">
      <div class="card h-100">
        <img src="./t-shirt.webp" class="card-img-top" alt="Product Image">
        <div class="card-body">
          <h5 class="card-title">T-shirt</h5>
          <p class="card-text">for look good wear good</p>
          <p class="fw-bold">$9.99</p>
          <a href="#" class="btn btn-success">Add to Cart</a>
        </div>
      </div>
    </div>

    
    <div class="col">
      <div class="card h-100">
        <img src="./bafff-16755802320454-1920.webp" class="card-img-top" alt="Product Image">
        <div class="card-body">
          <h5 class="card-title">shoes</h5>
          <p class="card-text">for long period</p>
          <p class="fw-bold">$19.99</p>
          <a href="#" class="btn btn-warning">Add to Cart</a>
        </div>
      </div>
    </div>

  </div>
</div>


<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
