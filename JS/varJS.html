<!DOCTYPE html>
<html lang="en">

<body>
    <script>
        //JS data value types in js
        //primitive - single value variation which are immutable
        //string ,number,bbolean,undefined,null,bigInt,symbol


        var myName="harsh";
        console.log(myName);
        console.log(typeof(myName));
        //number
        var myMob=9560450458;
        console.log(myName+"mobile number is"+ myMob);

        //boolean
        var isMarried=true;
        console.log(myName+"is married ?"+ isMarried);

        //undefined
        var myEmail;
        console.log(myEmail);
        console.log(typeof(myEmail));

        //null
        var myAddress=null;
        console.log(myAddress);
        console.log(typeof(myAddress));

        //BigInt
        var myVal=BigInt(67243897872866758655673246);
        console.log(myVal);
        console.log(typeof(myVal));

        //Symbol
        var name1=Symbol("lucky");
        var name2=Symbol("diva");
        console.log(name1==name2);


        //refrence (object) typed==mutable in memory and keeps values in pair
        //object,function,array

        //object are defined in pair of key and its value.

        let myInfo={
            name:"megha",
            age:23,
             isMarried:true, 
             mob:9560450458,
             add:null,
             branch:"CSE",
             section:23
        };
        console.log(myInfo);
        console.log(myInfo.name);   // access object's key i.e name
        //object length

        let keys=Object.keys(myInfo);
        console.log("myInfo object length"+keys.length);

        //function - block of code that performs particular task

        function cal()
            {
                var num1=45;
                var num2=40;
                var res=num1+num2;
                console.log("addition of two numbers is"+ res);
                console.log(typeof(cal));

            }
            cal();
            //array -collection of any data types in JS

            //for similar data types
            let studentList=["vikas","abhay","nitu","vinay","rahul"];
            console.log(studentList[1]);

            //for any data types
            let vikasInfo=["vikas singh", 23,false, null,"CSE",18];
                console.log(vikasInfo[1]);
                console.log(typeof(vikasInfo));

                //to iterate a array member
                for(let i=0;i<vikasInfo.length;i++)
            {
                console.log(vikasInfo[i]);
            }




        
    </script>
